name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  release:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Publish to npm (only when changesets are pending)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          # Skip cleanly when there's nothing to publish.
          if ! ls .changeset/*.md 2>/dev/null | grep -v config.json | grep -q .; then
            echo "no changesets pending — skipping publish"
            exit 0
          fi
          # Build first so the tarball includes the bumped version string in
          # its CLI --version output (M2+ used a hardcoded value; we now
          # read from package.json).
          npx changeset version
          npm run build
          # --provenance attaches an SLSA provenance statement when the
          # registry + the token support it; harmless if it falls back.
          npm publish --provenance --access public
          echo "published $(node -p 'require(\"./package.json\").version')"
